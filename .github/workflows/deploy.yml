name: Deploy Advertisement API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: krafton-jungle-project-4team/loop-ad_infra/.github/workflows/ecs-deploy.yml@main
    with:
      environment: dev
      aws_region: ap-northeast-2
      service_name: advertisement-api
      ecr_repository: loop-ad/advertisement-api
      ecs_cluster: dev-loop-ad-cluster
      ecs_service: dev-advertisement-api
      container_name: advertisement-api
      dockerfile: Dockerfile
      context: .
      image_tag: ${{ github.sha }}
      wait_for_service_stability: true
    secrets: inherit
